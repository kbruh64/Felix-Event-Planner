<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felix Event Planner</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Auth Screen -->
    <div id="auth-screen" class="overlay visible">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="auth-logo-icon">🎉</span>
                <span class="auth-logo-text">Felix Planner</span>
            </div>
            <div class="auth-tabs">
                <div class="auth-tab active">Sign In</div>
                <div class="auth-tab">Sign Up</div>
            </div>
            <div class="auth-form">
                <input type="email" placeholder="Email Address">
                <input type="password" placeholder="Password">
                <button class="auth-submit" onclick="closeAuth()">Sign In</button>
            </div>
        </div>
    </div>

    <header>
        <div class="logo"><span class="logo-icon">🎈</span> Felix <span style="color: var(--accent)">Planner</span></div>
        <div style="display:flex; align-items:center; gap:12px">
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
            <button class="btn btn-secondary" onclick="copyEventLink()">🔗 Share</button>
            <button class="btn btn-primary" onclick="window.print()">🖨️ Print</button>
        </div>
    </header>

    <div class="layout">
        <nav>
            <div class="nav-item active" onclick="showSection('dashboard', this)">🏠 Home</div>
            <div class="nav-item" onclick="showSection('guests', this)">🐥 Guests</div>
            <div class="nav-item" onclick="showSection('budget', this)">💰 Piggy Bank</div>
            <div class="nav-item" onclick="showSection('analytics', this)">📊 Progress</div>
        </nav>

        <main id="app">
        <!-- Onboarding Modal -->
        <div id="onboarding-modal" class="modal hidden">
            <div class="modal-content">
                <h2 style="color: var(--primary)">Hi there! 👋</h2>
                <p class="subtitle">Let's make planning your next event a breeze.</p>
                <div class="survey-form">
                    <div class="input-group">
                        <label>I am a...</label>
                        <select id="user-type">
                            <option value="Grade 6 Student">Grade 6 Student</option>
                            <option value="Parent">Parent</option>
                            <option value="Professional">Professional Planner</option>
                            <option value="Teacher">Teacher</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>My main goal is...</label>
                        <input type="text" id="user-goal" placeholder="e.g., Happy kids, no stress!">
                    </div>
                    <div class="input-group">
                        <label>My biggest planning headache is...</label>
                        <input type="text" id="user-dislike" placeholder="e.g., Forgetting the snacks">
                    </div>

                    <button class="btn-primary" onclick="finishOnboarding()">Let's Go!</button>
                </div>
            </div>
        </div>

        <!-- Tutorial Overlay -->
        <div id="tutorial-overlay" class="tutorial-overlay hidden" onclick="nextTutorialStep()">
            <div id="tutorial-box" class="tutorial-box">
                <p id="tutorial-text"></p>
                <button class="btn-primary">Got it</button>
            </div>
        </div>

        <!-- Dashboard Section -->
        <section id="dashboard-section">
            <div class="page-header">
                <div class="page-title">Ready for Fun?</div>
                <div class="page-subtitle" id="countdown-timer" style="background: var(--accent-light); padding: 5px 12px; border-radius: 20px; color: var(--accent)">00d 00h left</div>
            </div>

            <div class="stats-row">
                <div class="stat-card blue">
                    <div class="stat-label">My Planning Style</div>
                    <div id="profile-content" style="font-size: 0.9rem; margin-top: 5px;"></div>
                    <button class="btn btn-sm btn-secondary" onclick="startTutorial()" style="margin-top:10px">Help</button>
                </div>
                <div class="stat-card green">
                    <div class="stat-label">RSVP Status</div>
                    <div class="stat-value" id="rsvp-stat">0%</div>
                </div>
            </div>

            <h3 style="margin-bottom: 10px;">What are we celebrating?</h3>
            <div class="category-grid" id="category-selector" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin: 15px 0;">
                <!-- Categories here -->
            </div>

            <div id="template-section" class="detail-section hidden">
                <h3>Planning Checklist</h3>
                <div class="task-list" id="checklist-items"></div>
            </div>
        </section>

        <!-- Other sections continue... -->
        </main>
    </div>

    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
